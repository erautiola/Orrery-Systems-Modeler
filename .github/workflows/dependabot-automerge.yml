name: Dependabot auto-merge

# Enables GitHub auto-merge on Dependabot PRs so they merge *after* required
# status checks (CI tests + Docker build) pass. Patch/minor and GitHub-Actions
# updates auto-merge; major version bumps are left for manual review.
#
# Requires (repo settings, one-time):
#   - Settings → General → "Allow auto-merge"
#   - A branch-protection rule on `main` with the CI checks marked "Required"
#     (so auto-merge waits for them instead of merging immediately).

on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    if: ${{ github.actor == 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge (patch/minor + actions)
        if: >-
          steps.meta.outputs.update-type == 'version-update:semver-patch' ||
          steps.meta.outputs.update-type == 'version-update:semver-minor' ||
          steps.meta.outputs.package-ecosystem == 'github_actions'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment on held major updates
        if: ${{ steps.meta.outputs.update-type == 'version-update:semver-major' }}
        run: gh pr comment "$PR_URL" --body "🚧 Major version bump — held for manual review (auto-merge not enabled). CI must still pass."
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
