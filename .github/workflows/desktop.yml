name: Desktop build

# Builds standalone desktop installers (Windows / macOS / Linux) with Electron.
# On a version tag they are attached to the GitHub Release; otherwise uploaded
# as workflow artifacts.
on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install desktop tooling
        working-directory: desktop
        run: npm install

      - name: Build installer
        working-directory: desktop
        run: npm run dist
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false" # build unsigned (no auto-publish)

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: orrery-desktop-${{ matrix.os }}
          path: |
            desktop/dist/*.exe
            desktop/dist/*.dmg
            desktop/dist/*.AppImage
          if-no-files-found: warn

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            desktop/dist/*.exe
            desktop/dist/*.dmg
            desktop/dist/*.AppImage
