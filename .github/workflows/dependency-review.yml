name: Dependency Review

# Scans dependency changes on pull requests and fails on known-vulnerable adds.
on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Dependency Review
        # Requires GitHub's Dependency Graph (enabled on this repo).
        # Gates PRs that introduce high-severity vulnerable dependencies.
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
