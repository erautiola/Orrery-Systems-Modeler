name: Dependency Review

# Scans dependency changes on pull requests and fails on known-vulnerable adds.
on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Dependency Review
        # Requires GitHub's Dependency Graph to be enabled on the repo
        # (Settings → Code security → Dependency graph). Until then this step
        # is advisory; remove continue-on-error to make it gate PRs.
        uses: actions/dependency-review-action@v4
        continue-on-error: true
        with:
          fail-on-severity: high
