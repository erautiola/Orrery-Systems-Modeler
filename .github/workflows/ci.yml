name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-audit:
    name: Lint & dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: server/package-lock.json
      - name: Install server dependencies
        working-directory: server
        run: npm ci
      - name: Syntax-check all JavaScript
        run: |
          for f in server/*.js public/js/*.js; do
            echo "checking $f"
            node --check "$f"
          done
      - name: npm audit (production deps)
        working-directory: server
        run: npm audit --omit=dev --audit-level=high

  feature-gate:
    name: Feature checklist (tests + docs)
    # Policy: every PR that changes feature/source code must also update or add
    # tests (server/test/**) AND documentation (docs/**, README.md, CHANGELOG.md).
    # Bypass for non-feature PRs with the "skip-feature-gate" label.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Require tests + docs for feature changes
        env:
          BASE: ${{ github.event.pull_request.base.sha }}
          HEAD: ${{ github.event.pull_request.head.sha }}
          ACTOR: ${{ github.actor }}
          LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
        run: |
          if [ "$ACTOR" = "dependabot[bot]" ]; then echo "Dependabot PR — gate skipped."; exit 0; fi
          case ",$LABELS," in *,skip-feature-gate,*) echo "'skip-feature-gate' label present — gate skipped."; exit 0 ;; esac
          files=$(git diff --name-only "$BASE" "$HEAD")
          echo "Changed files:"; echo "$files"
          src=$(echo "$files" | grep -E '^(public/js/.*\.js|server/[^/]+\.js)$' | grep -v '^server/test/' || true)
          if [ -z "$src" ]; then echo "No feature/source changes detected — gate passes."; exit 0; fi
          tests=$(echo "$files" | grep -E '^server/test/' || true)
          docs=$(echo "$files" | grep -E '^(docs/|README\.md|CHANGELOG\.md)' || true)
          missing=""
          [ -z "$tests" ] && missing="$missing tests(server/test/**)"
          [ -z "$docs" ]  && missing="$missing docs(docs/**|README.md|CHANGELOG.md)"
          if [ -n "$missing" ]; then
            echo "::error::Feature/source changes detected but the PR is missing:$missing"
            echo "Per policy, add/refresh unit+integration tests AND documentation for each feature before merge."
            echo "For genuinely non-feature changes, add the 'skip-feature-gate' label."
            exit 1
          fi
          echo "Feature change includes tests and docs — gate passes."

  test:
    name: Unit & integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: server/package-lock.json
      - name: Install server dependencies
        working-directory: server
        run: npm ci
      - name: Run unit + integration tests
        working-directory: server
        run: npm test

  docker-build:
    name: Docker image builds & tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Build image
        run: docker build -t orrery-systems-modeler:ci .
      - name: Run tests inside the built image
        run: docker run --rm orrery-systems-modeler:ci sh -c "cd server && node --test"
      - name: Smoke test (container responds on /api/health)
        run: |
          docker run -d --name osm -p 8137:8137 orrery-systems-modeler:ci
          for i in $(seq 1 20); do
            if curl -fs http://localhost:8137/api/health; then echo "OK"; exit 0; fi
            sleep 1
          done
          echo "health check failed"; docker logs osm; exit 1
